<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mettarol — репозиторий приложений</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f0f4f8 0%, #e6ecf3 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* шапка */
    .header {
      background: rgba(32, 42, 68, 0.95);
      backdrop-filter: blur(8px);
      color: white;
      padding: 0.8rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      border-bottom: 2px solid #4f7aa6;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .logo-icon {
      font-size: 2rem;
      filter: drop-shadow(0 2px 4px #00000040);
    }

    .site-title {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 #1a2637;
    }

    .site-title span {
      color: #b3e0ff;
      font-size: 1rem;
      margin-left: 8px;
      font-weight: 300;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 0 1rem;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: #d9e2ef;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid transparent;
    }

    .tab-btn:hover {
      background: rgba(255,255,255,0.1);
      color: white;
      border-color: #5f8ab6;
    }

    .tab-btn.active {
      background: #2c3e5c;
      color: white;
      border: 1px solid #7aa5d3;
      box-shadow: inset 0 2px 5px #1f2b3b;
    }

    .login-block {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #loginBtn {
      background: #4f7aa6;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.5rem 1.8rem;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 2px 6px #1f3142;
      transition: 0.15s;
      border: 1px solid #79b0df;
    }

    #loginBtn:hover {
      background: #5f8ec2;
      transform: scale(1.02);
    }

    .owner-badge {
      background: #2f4b2f;
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.9rem;
      border: 1px solid #8bc34a;
      display: none; /* скрыт по умолчанию */
      align-items: center;
      gap: 6px;
    }

    .owner-badge.show {
      display: flex;
    }

    .lock-icon {
      font-size: 1.1rem;
    }

    /* основной контейнер */
    .app-container {
      max-width: 1300px;
      margin: 2rem auto;
      padding: 0 2rem;
      flex: 1;
      width: 100%;
    }

    /* панель владельца (добавить тему) */
    .owner-panel {
      background: rgba(38, 50, 70, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 1.5rem 2rem;
      margin-bottom: 2.5rem;
      color: white;
      border: 1px solid #6a8bb0;
      display: none;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 6px 14px #00000055;
    }

    .owner-panel.visible {
      display: flex;
    }

    .panel-title {
      font-weight: 500;
      background: #1e2a3a;
      padding: 0.3rem 1rem;
      border-radius: 30px;
    }

    .add-form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }

    .add-form input, .add-form select {
      padding: 0.6rem 1rem;
      border-radius: 40px;
      border: none;
      background: #fafcff;
      min-width: 200px;
      font-size: 0.95rem;
    }

    .add-form button {
      background: #2b6c4b;
      color: white;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.1s;
      border: 1px solid #77b58c;
    }

    .add-form button:hover {
      background: #34875d;
    }

    /* контейнер тем (карточки) */
    .themes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
      margin-top: 1.5rem;
    }

    .theme-card {
      background: #ffffffdb;
      backdrop-filter: blur(3px);
      border-radius: 28px;
      padding: 1.4rem 1.2rem;
      box-shadow: 0 12px 24px -8px rgba(0, 20, 40, 0.3);
      border: 2px solid rgba(255,255,255,0.7);
      transition: transform 0.1s, box-shadow 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .theme-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 22px 30px -10px #1f3a5f;
      border-color: #9bb9da;
    }

    .theme-name {
      font-size: 1.6rem;
      font-weight: 600;
      color: #13293d;
      word-break: break-word;
    }

    .theme-badge {
      background: #3f5170;
      color: white;
      padding: 0.25rem 1rem;
      border-radius: 30px;
      font-size: 0.8rem;
      align-self: flex-start;
      letter-spacing: 0.5px;
    }

    .theme-description {
      color: #2d3b4e;
      font-size: 0.95rem;
      border-left: 3px solid #607d8b;
      padding-left: 12px;
      margin: 4px 0;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .app-count {
      background: #cfdef5;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .download-hint {
      color: #266b9c;
      font-weight: 500;
    }

    /* модальное окно (таблица ссылок) */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #edf2fa;
      border-radius: 48px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 2rem 2rem 1.8rem;
      box-shadow: 0 25px 50px -8px black;
      border: 3px solid white;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #a0b9d6;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      color: #14273e;
      font-weight: 600;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: #4d6380;
      line-height: 1;
    }

    .apps-table {
      width: 100%;
      border-collapse: collapse;
    }

    .apps-table th {
      text-align: left;
      background: #b7cbe2;
      padding: 12px 10px;
      font-weight: 600;
    }

    .apps-table td {
      padding: 14px 10px;
      border-bottom: 1px solid #b1c3d8;
    }

    .apps-table a {
      color: #1f5090;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px dashed #517ea8;
    }

    .apps-table a:hover {
      color: #03234b;
      border-bottom: 2px solid;
    }

    .no-apps {
      text-align: center;
      color: #4d6079;
      font-style: italic;
      padding: 2rem;
    }

    .footer-note {
      margin-top: 2.5rem;
      text-align: center;
      color: #3a4d66;
      font-weight: 500;
    }

    /* логин модал */
    .login-modal .modal-content {
      max-width: 400px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .login-form input {
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid #bacfe8;
      font-size: 1rem;
    }

    .login-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .login-actions button {
      padding: 10px 28px;
      border-radius: 30px;
      border: none;
      font-weight: 600;
      background: #3c6192;
      color: white;
      cursor: pointer;
    }

    #cancelLogin {
      background: #7b8a9e;
    }

    #cancelLogin:hover {
      background: #5e6d84;
    }

    .error-message {
      color: #be3b3b;
      font-weight: 500;
      padding-left: 10px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo-area">
      <span class="logo-icon">⬢</span>
      <div class="site-title">Mettarol<span>alpha</span></div>
    </div>
    <div class="tabs" id="tabContainer">
      <button class="tab-btn active" data-tab="win7">Windows 7 and ></button>
      <button class="tab-btn" data-tab="win8">Windows 8 and &#60;</button>
    </div>
    <div class="login-block">
      <button id="loginBtn">🔐 Вход</button>
      <div id="ownerBadge" class="owner-badge">
        <span class="lock-icon">⚙️</span> Владелец
      </div>
    </div>
  </header>

  <main class="app-container">
    <!-- панель владельца (добавление тем) -->
    <div id="ownerPanel" class="owner-panel">
      <span class="panel-title">➕ Панель управления (только для владельца)</span>
      <div class="add-form">
        <input type="text" id="themeNameInput" placeholder="Название темы" maxlength="40">
        <input type="text" id="themeDescInput" placeholder="Краткое описание">
        <select id="themeCategorySelect">
          <option value="win7">Windows 7 and ></option>
          <option value="win8">Windows 8 and <</option>
        </select>
        <button id="addThemeBtn">➕ Добавить тему</button>
      </div>
    </div>

    <!-- динамические карточки тем -->
    <div id="win7Container" style="display: block;">
      <h2 style="color:#1f3a5f;">📦 Windows 7 and > · приложения</h2>
      <div id="win7Themes" class="themes-grid"></div>
    </div>
    <div id="win8Container" style="display: none;">
      <h2 style="color:#1f3a5f;">📱 Windows 8 and < · приложения</h2>
      <div id="win8Themes" class="themes-grid"></div>
    </div>
    <div class="footer-note">✧ нажми на любую тему — откроются ссылки для скачивания ✧</div>
  </main>

  <!-- модальное окно со ссылками (таблица) -->
  <div id="appsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalThemeTitle">Название темы</h2>
        <button class="close-btn" id="closeModalBtn">&times;</button>
      </div>
      <table class="apps-table" id="appsTable">
        <thead><tr><th>Приложение</th><th>Ссылка для скачивания</th></tr></thead>
        <tbody id="appsTableBody">
          <!-- заполняется js -->
        </tbody>
      </table>
      <div style="margin-top:20px; text-align:right; font-size:0.9rem;">Mettarol disk repository</div>
    </div>
  </div>

  <!-- модальное окно входа (без регистрации) -->
  <div id="loginModal" class="modal login-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>🔒 вход владельца</h2>
        <button class="close-btn" id="closeLoginModalBtn">&times;</button>
      </div>
      <div class="login-form">
        <input type="text" id="loginUsername" placeholder="логин" value="Mettarol-2026-Owner-Site-Official">
        <input type="password" id="loginPassword" placeholder="пароль">
        <div class="login-actions">
          <button id="submitLogin">войти</button>
          <button id="cancelLogin">отмена</button>
        </div>
        <div id="loginError" class="error-message"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- ДАННЫЕ (хранилище тем и приложений) -----
      let themesData = {
        win7: [   // Windows 7 and >
          { id: 'w7_1', name: 'Офисный пак 2025', description: 'Word, Excel, PowerPoint портативные', apps: [{ name: 'LibreOffice', url: 'http://yandex.disk/libreoffice' }, { name: 'OnlyOffice', url: 'http://disk.yandex/onlyoffice' }] },
          { id: 'w7_2', name: 'Графика и дизайн', description: 'Для художников и редакторов', apps: [{ name: 'GIMP 2.10', url: 'http://yandex.disk/gimp' }, { name: 'Inkscape', url: 'http://disk.yandex/inkscape' }] },
          { id: 'w7_3', name: 'Браузеры', description: 'Firefox, Chrome, Opera', apps: [{ name: 'Firefox ESR', url: 'http://yandex.disk/firefox' }] }
        ],
        win8: [   // Windows 8 and <
          { id: 'w8_1', name: 'Утилиты для Win8', description: 'Твикеры, оптимизация', apps: [{ name: 'CCleaner', url: 'http://yandex.disk/ccleaner' }, { name: 'Defraggler', url: 'http://disk.yandex/defraggler' }] },
          { id: 'w8_2', name: 'Старые игры', description: 'Классика 2000-2010', apps: [{ name: 'NFS Most Wanted', url: 'http://yandex.disk/nfs' }] }
        ]
      };

      // вспомогательная функция сохранения (в реальном проекте localStorage, но здесь оставим в памяти)
      function saveToStorage() {
        // для демо просто сохраняем в localStorage
        localStorage.setItem('mettarol_themes', JSON.stringify(themesData));
      }

      function loadFromStorage() {
        const stored = localStorage.getItem('mettarol_themes');
        if (stored) {
          try { themesData = JSON.parse(stored); } catch(e){}
        }
      }
      loadFromStorage();

      // ----- СОСТОЯНИЯ И ЭЛЕМЕНТЫ -----
      let currentTab = 'win7';          // активная вкладка
      let isOwner = false;              // флаг владельца
      let currentModalThemeId = null;   // id темы, открытой в модалке

      const win7Container = document.getElementById('win7Container');
      const win8Container = document.getElementById('win8Container');
      const win7ThemesDiv = document.getElementById('win7Themes');
      const win8ThemesDiv = document.getElementById('win8Themes');
      const tabButtons = document.querySelectorAll('.tab-btn');
      const ownerPanel = document.getElementById('ownerPanel');
      const ownerBadge = document.getElementById('ownerBadge');
      const loginBtn = document.getElementById('loginBtn');
      const loginModal = document.getElementById('loginModal');
      const closeLoginModalBtn = document.getElementById('closeLoginModalBtn');
      const submitLogin = document.getElementById('submitLogin');
      const cancelLogin = document.getElementById('cancelLogin');
      const loginUsername = document.getElementById('loginUsername');
      const loginPassword = document.getElementById('loginPassword');
      const loginError = document.getElementById('loginError');
      const appsModal = document.getElementById('appsModal');
      const modalThemeTitle = document.getElementById('modalThemeTitle');
      const appsTableBody = document.getElementById('appsTableBody');
      const closeModalBtn = document.getElementById('closeModalBtn');
      const addThemeBtn = document.getElementById('addThemeBtn');
      const themeNameInput = document.getElementById('themeNameInput');
      const themeDescInput = document.getElementById('themeDescInput');
      const themeCategorySelect = document.getElementById('themeCategorySelect');

      // ----- ОТРИСОВКА КАРТОЧЕК ТЕМ -----
      function renderThemes() {
        // Очистка
        win7ThemesDiv.innerHTML = '';
        win8ThemesDiv.innerHTML = '';

        // отрисовка win7
        themesData.win7.forEach(theme => {
          const card = createThemeCard(theme, 'win7');
          win7ThemesDiv.appendChild(card);
        });

        // отрисовка win8
        themesData.win8.forEach(theme => {
          const card = createThemeCard(theme, 'win8');
          win8ThemesDiv.appendChild(card);
        });
      }

      function createThemeCard(theme, category) {
        const card = document.createElement('div');
        card.className = 'theme-card';
        card.dataset.themeId = theme.id;
        card.dataset.category = category;
        card.innerHTML = `
          <div class="theme-name">${escapeHtml(theme.name)}</div>
          <div class="theme-badge">${category === 'win7' ? 'Windows 7 and >' : 'Windows 8 and <'}</div>
          <div class="theme-description">${escapeHtml(theme.description) || 'Описание отсутствует'}</div>
          <div class="card-footer">
            <span class="app-count">📋 ${theme.apps.length} прил.</span>
            <span class="download-hint">🔽 подробнее</span>
          </div>
        `;
        card.addEventListener('click', () => openModal(theme.id, category));
        return card;
      }

      function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe.replace(/[&<>"']/g, function(m) {
          if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;';
          if(m === '"') return '&quot;'; return '&#039;';
        });
      }

      // открыть модалку с таблицей приложений
      function openModal(themeId, category) {
        const theme = themesData[category].find(t => t.id === themeId);
        if (!theme) return;
        currentModalThemeId = themeId;
        modalThemeTitle.innerText = theme.name + ' · ссылки';
        appsTableBody.innerHTML = '';
        if (theme.apps.length === 0) {
          appsTableBody.innerHTML = '<tr><td colspan="2" class="no-apps">приложений пока нет</td></tr>';
        } else {
          theme.apps.forEach(app => {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${escapeHtml(app.name)}</td><td><a href="${escapeHtml(app.url)}" target="_blank">${escapeHtml(app.url)}</a></td>`;
            appsTableBody.appendChild(row);
          });
        }
        appsModal.classList.add('show');
      }

      // переключение вкладок
      function switchTab(tabId) {
        currentTab = tabId;
        win7Container.style.display = tabId === 'win7' ? 'block' : 'none';
        win8Container.style.display = tabId === 'win8' ? 'block' : 'none';
        tabButtons.forEach(btn => {
          const tab = btn.dataset.tab;
          btn.classList.toggle('active', tab === tabId);
        });
      }

      // ВХОД (без регистрации) с жестко заданными креденшелами
      function handleLogin() {
        const user = loginUsername.value.trim();
        const pwd = loginPassword.value.trim();
        if (user === 'Mettarol-2026-Owner-Site-Official' && pwd === '4357876920149992014') {
          isOwner = true;
          ownerBadge.classList.add('show');
          ownerPanel.classList.add('visible');
          loginModal.classList.remove('show');
          loginError.innerText = '';
          loginUsername.value = ''; // очистим для безопасности (но можно оставить)
          loginPassword.value = '';
        } else {
          loginError.innerText = 'Неверный логин или пароль';
        }
      }

      // выход (скрыть панель)
      function logoutOwner() {
        isOwner = false;
        ownerBadge.classList.remove('show');
        ownerPanel.classList.remove('visible');
      }

      // добавление темы (владелец)
      function addNewTheme() {
        if (!isOwner) {
          alert('Только владелец может добавлять темы!');
          return;
        }
        const name = themeNameInput.value.trim();
        const desc = themeDescInput.value.trim();
        const cat = themeCategorySelect.value; // win7 или win8
        if (!name) {
          alert('Введите название темы');
          return;
        }
        const newTheme = {
          id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
          name: name,
          description: desc || 'без описания',
          apps: []   // изначально пусто
        };
        themesData[cat].push(newTheme);
        saveToStorage();
        renderThemes();
        themeNameInput.value = '';
        themeDescInput.value = '';
      }

      // ----- обработчики событий -----
      tabButtons.forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });

      loginBtn.addEventListener('click', () => {
        loginModal.classList.add('show');
        loginError.innerText = '';
        loginUsername.value = 'Mettarol-2026-Owner-Site-Official'; // для удобства
        loginPassword.value = '';
      });

      closeLoginModalBtn.addEventListener('click', () => {
        loginModal.classList.remove('show');
      });
      cancelLogin.addEventListener('click', () => {
        loginModal.classList.remove('show');
      });
      submitLogin.addEventListener('click', handleLogin);

      // закрытие модалки по крестику
      closeModalBtn.addEventListener('click', () => {
        appsModal.classList.remove('show');
      });

      // закрытие по клику вне модалки
      window.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) {
          e.target.classList.remove('show');
        }
      });

      // добавить тему
      addThemeBtn.addEventListener('click', addNewTheme);

      // небольшая возможность добавить приложение в тему (расширенная функция для владельца)
      // Для простоты добавим контекстное меню? но лучше предоставим владельцу кнопку в модалке? 
      // но по заданию "добавлять приложения (то есть ссылку на какой-то диск)" - имеется ввиду что владелец может добавить в тему ссылку.
      // Сделаем: двойной клик по теме в режиме владельца предложит добавить приложение. 
      // Но для чистоты UX добавим маленькую кнопку "➕" в панели владельца рядом с каждой темой? Это усложняет. Реализуем быстрое добавление через prompt, когда владелец открывает тему и видит таблицу. 
      // Добавим под таблицей форму для владельца (скрытую от обычных). Отобразим её только если isOwner === true.

      // модифицируем openModal: после отрисовки таблицы добавить строку ввода, если isOwner
      const originalOpenModal = openModal;
      openModal = function(themeId, category) {
        originalOpenModal(themeId, category);
        // добавим в модалку интерфейс добавления приложения для владельца (если владелец)
        const existingForm = document.getElementById('ownerAppForm');
        if (existingForm) existingForm.remove();

        if (isOwner) {
          const theme = themesData[category].find(t => t.id === themeId);
          if (!theme) return;
          const formDiv = document.createElement('div');
          formDiv.id = 'ownerAppForm';
          formDiv.style.marginTop = '20px';
          formDiv.style.background = '#dce5f2';
          formDiv.style.padding = '15px';
          formDiv.style.borderRadius = '28px';
          formDiv.innerHTML = `
            <strong style="color:#142a44;">➕ Добавить приложение (владелец)</strong><br>
            <input type="text" id="appNameInput" placeholder="Название приложения" style="padding:8px; margin:8px 0; width:100%; border-radius:40px; border:1px solid #7b98bb;">
            <input type="text" id="appUrlInput" placeholder="http://yandex.disk/..." style="padding:8px; margin:8px 0; width:100%; border-radius:40px; border:1px solid #7b98bb;">
            <button id="saveAppBtn" style="background:#2c7844; color:white; border:none; padding:10px 20px; border-radius:40px; font-weight:bold; cursor:pointer;">Сохранить ссылку</button>
          `;
          appsModal.querySelector('.modal-content').appendChild(formDiv);

          document.getElementById('saveAppBtn').addEventListener('click', function() {
            const appName = document.getElementById('appNameInput').value.trim();
            const appUrl = document.getElementById('appUrlInput').value.trim();
            if (!appName || !appUrl) {
              alert('Заполните оба поля');
              return;
            }
            theme.apps.push({ name: appName, url: appUrl });
            saveToStorage();
            // обновить таблицу
            openModal(themeId, category);
          });
        }
      };

      // переопределяем функцию, чтобы работала и с ownerPanel
      window.openModal = openModal;

      // инициализация рендера
      renderThemes();
      switchTab('win7');
      // при загрузке если вдруг был владельцем (но без сохранения сессии, сброс)
      // на всякий случай logoutOwner()
      logoutOwner(); // начинаем без прав
    })();
  </script>
</body>
</html>
